<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Check In — {{ event.name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{min-height:100vh;background:#0f0f0f;color:#e5e5e5;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;-webkit-font-smoothing:antialiased}
        .card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:28px 24px;width:100%;max-width:400px}
        .brand{display:flex;align-items:center;gap:8px;margin-bottom:28px}
        .brand-icon{width:30px;height:30px;background:#3b82f6;border-radius:7px;display:flex;align-items:center;justify-content:center}
        h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
        .meta{font-size:13px;color:#737373;margin-bottom:24px}
        .field{margin-bottom:16px}
        label{display:block;font-size:13px;font-weight:600;color:#a3a3a3;margin-bottom:6px}
        input{width:100%;background:#242424;border:1px solid #333;border-radius:10px;padding:13px 14px;color:#e5e5e5;font-family:'DM Sans',sans-serif;font-size:16px;transition:border-color 150ms}
        input::placeholder{color:#525252}
        input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.15)}
        .btn{width:100%;background:#3b82f6;color:white;border:none;border-radius:10px;padding:14px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:background 150ms,transform 100ms;margin-top:8px}
        .btn:hover{background:#2563eb}
        .btn:active{transform:scale(0.98)}
        .error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#ef4444;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="brand-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
            </div>
            <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:#fff;">ScanMark</span>
        </div>

        <h1>{{ event.name }}</h1>
        <div class="meta">
            {{ event.date.strftime('%d %B %Y') }} &nbsp;·&nbsp; {{ event.start_time.strftime('%H:%M') }}
            {% if event.venue %} &nbsp;·&nbsp; {{ event.venue }}{% endif %}
        </div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" autocomplete="off">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="field">
                <label>Your Name <span style="color:#ef4444">*</span></label>
                <input type="text" name="name" placeholder="Full name" required autofocus autocomplete="name">
            </div>
            <div class="field">
                <label>Email Address <span style="color:#525252;font-weight:400;">(optional)</span></label>
                <input type="email" name="email" placeholder="you@email.com" autocomplete="email">
            </div>
            <button type="submit" class="btn">Check In →</button>
        </form>
    </div>
    <p style="color:#525252;font-size:12px;margin-top:20px;">Powered by <strong style="color:#3b82f6;">ScanMark</strong></p>
</body>
</html>
