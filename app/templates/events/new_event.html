{% extends 'base.html' %}
{% block title %}New Event{% endblock %}

{% block content %}
<div style="max-width:640px;">
    <div style="margin-bottom:28px;">
        <a href="{{ url_for('events.events_list') }}" style="display:inline-flex;align-items:center;gap:6px;color:#737373;font-size:13px;text-decoration:none;margin-bottom:16px;transition:color 150ms;" onmouseover="this.style.color='#e5e5e5'" onmouseout="this.style.color='#737373'">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Back to events
        </a>
        <h1 style="font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:#fff;">Create New Event</h1>
        <p style="color:#737373;font-size:14px;margin-top:4px;">A walk-in QR code and attendee portal will be generated automatically.</p>
    </div>

    <form method="POST" action="{{ url_for('events.new_event') }}" novalidate x-data="{ enforce: true, loading: false }" @submit="loading = true">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="card" style="margin-bottom:20px;">
            <div style="font-size:13px;font-weight:600;color:#a3a3a3;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:16px;">Event Details</div>
            <div style="display:flex;flex-direction:column;gap:16px;">

                <div>
                    <label style="display:block;font-size:13px;font-weight:600;color:#a3a3a3;margin-bottom:6px;">Event Name <span style="color:#ef4444">*</span></label>
                    <input type="text" name="name" class="form-input" placeholder='e.g. "Tech Summit 2025"' required autocomplete="off">
                </div>

                <div>
                    <label style="display:block;font-size:13px;font-weight:600;color:#a3a3a3;margin-bottom:6px;">Venue</label>
                    <input type="text" name="venue" class="form-input" placeholder='e.g. "The Grand Hall, Lagos"'>
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                    <div>
                        <label style="display:block;font-size:13px;font-weight:600;color:#a3a3a3;margin-bottom:6px;">Date <span style="color:#ef4444">*</span></label>
                        <input type="date" name="date" class="form-input" required>
                    </div>
                    <div>
                        <label style="display:block;font-size:13px;font-weight:600;color:#a3a3a3;margin-bottom:6px;">Start Time <span style="color:#ef4444">*</span></label>
                        <input type="time" name="start_time" class="form-input" required>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom:20px;">
            <div style="font-size:13px;font-weight:600;color:#a3a3a3;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:16px;">Capacity</div>
            <div style="display:flex;flex-direction:column;gap:14px;">
                <div>
                    <label style="display:block;font-size:13px;font-weight:600;color:#a3a3a3;margin-bottom:6px;">Maximum Capacity <span style="color:#737373;font-weight:400;">(optional)</span></label>
                    <input type="number" name="max_capacity" class="form-input" placeholder="e.g. 500" min="1" style="max-width:200px;">
                    <p style="font-size:12px;color:#737373;margin-top:4px;">Leave blank for unlimited.</p>
                </div>

                <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
                    <input type="checkbox" name="capacity_enforcement" x-model="enforce" style="width:16px;height:16px;accent-color:#3b82f6;">
                    <div>
                        <div style="font-size:14px;font-weight:600;color:#fff;">Enforce capacity limit</div>
                        <div style="font-size:12px;color:#737373;margin-top:2px;">Show warnings when approaching and reaching capacity.</div>
                    </div>
                </label>
            </div>
        </div>

        <div style="display:flex;gap:10px;justify-content:flex-end;">
            <a href="{{ url_for('events.events_list') }}" class="btn-secondary">Cancel</a>
            <button type="submit" class="btn-primary" :disabled="loading">
                <span x-show="!loading">
                    Create Event
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                </span>
                <span x-show="loading" style="display:flex;align-items:center;gap:8px;">
                    <svg style="animation:spin 1s linear infinite;" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                    Creating…
                </span>
            </button>
        </div>
    </form>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
{% endblock %}
