{% extends 'base.html' %}
{% block title %}Page Not Found{% endblock %}

{% block full_page %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f0f0f;padding:40px 20px;">
    <div style="text-align:center;max-width:400px;" class="fade-in">
        <div style="font-family:'Syne',sans-serif;font-size:96px;font-weight:800;color:#1a1a1a;line-height:1;margin-bottom:16px;user-select:none;">404</div>
        <h1 style="font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:#fff;margin-bottom:8px;">Page not found</h1>
        <p style="color:#737373;font-size:15px;margin-bottom:32px;">The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('shared.index') }}" class="btn-primary">Go to dashboard</a>
    </div>
</div>
{% endblock %}
