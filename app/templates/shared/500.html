{% extends 'base.html' %}
{% block title %}Something went wrong{% endblock %}

{% block full_page %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f0f0f;padding:40px 20px;">
    <div style="text-align:center;max-width:440px;" class="fade-in">
        <div style="font-size:52px;margin-bottom:20px;">⚡</div>
        <h1 style="font-family:'Syne',sans-serif;font-size:24px;font-weight:700;color:#fff;margin-bottom:8px;">Something went wrong</h1>
        <p style="color:#737373;font-size:15px;margin-bottom:32px;">We hit an unexpected error. Our team has been notified. Please try again in a moment.</p>
        <div style="display:flex;gap:10px;justify-content:center;">
            <a href="javascript:history.back()" class="btn-primary">Go back</a>
            <a href="{{ url_for('shared.index') }}" class="btn-secondary">Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
